<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>交点计算器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: "宋体", "仿宋", "楷体", serif;
            background: linear-gradient(135deg, #fbeee6 0%, #ffe4e1 100%);
            color: #2d2d2d;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
        }
        h1, h2 {
            text-align: center;
            font-weight: normal;
            letter-spacing: 2px;
            color: #d7263d;
            text-shadow: 1px 1px 0 #fff8dc;
        }
        h1 {
            font-size: 1.7em;
            margin-top: 18px;
            margin-bottom: 26px;
        }
        h2 {
            font-size: 1.15em;
            margin-top: 20px;
            margin-bottom: 12px;
        }
        .section {
            background: linear-gradient(120deg, #ffe066 0%, #f9c846 100%);
            border: 2px solid #d7263d;
            border-radius: 12px;
            margin-bottom: 22px;
            padding: 14px;
            box-shadow: 0 2px 8px #d7263d33;
        }
        label {
            display: inline-block;
            min-width: 60px;
            font-size: 1em;
            color: #1768ac;
        }
        input[type="number"] {
            width: 60px;
            font-size: 1em;
            border: 2px solid #1768ac;
            border-radius: 6px;
            background: #eaf6fb;
            color: #0fc00f;
            margin: 2px 4px;
            padding: 2px 6px;
            box-shadow: 0 1px 3px #1768ac44;
        }
        button {
            background: linear-gradient(90deg, #d7263d 0%, #1768ac 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            font-size: 1.08em;
            margin-top: 10px;
            margin-bottom: 6px;
            box-shadow: 0 2px 6px #d7263d44;
            transition: background 0.2s;
        }
        button:active {
            background: linear-gradient(90deg, #99a3ac 0%, #0e4d0b 100%);
        }
        .result {
            color: #1768ac;
            font-size: 1.13em;
            margin-top: 10px;
            word-break: break-all;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff8dc;
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>陈国富的交点计算器</h1>

    <div class="section">
        <h2>两条直线交点</h2>
        <div>
            <label>直线1点1:</label> X <input id="l1x1" type="number"> Y <input id="l1y1" type="number"><br>
            <label>直线1点2:</label> X <input id="l1x2" type="number"> Y <input id="l1y2" type="number"><br>
            <label>直线2点1:</label> X <input id="l2x1" type="number"> Y <input id="l2y1" type="number"><br>
            <label>直线2点2:</label> X <input id="l2x2" type="number"> Y <input id="l2y2" type="number">
        </div>
        <button onclick="calcLineIntersection()">计算交点</button>
        <div class="result" id="lineResult"></div>
    </div>

    <div class="section">
        <h2>两个圆交点</h2>
        <div>
            <label>圆1圆心:</label> X <input id="c1x" type="number"> Y <input id="c1y" type="number"> 半径 <input id="c1r" type="number"><br>
            <label>圆2圆心:</label> X <input id="c2x" type="number"> Y <input id="c2y" type="number"> 半径 <input id="c2r" type="number">
        </div>
        <button onclick="calcCircleIntersection()">计算交点</button>
        <div class="result" id="circleResult"></div>
    </div>

    <div class="section">
        <h2>直线与圆交点</h2>
        <div>
            <label>直线点1:</label> X <input id="lx1" type="number"> Y <input id="ly1" type="number"><br>
            <label>直线点2:</label> X <input id="lx2" type="number"> Y <input id="ly2" type="number"><br>
            <label>圆心:</label> X <input id="cx" type="number"> Y <input id="cy" type="number"> 半径 <input id="cr" type="number">
        </div>
        <button onclick="calcLineCircleIntersection()">计算交点</button>
        <div class="result" id="lineCircleResult"></div>
    </div>
    </div>
    <script>
        // ...existing code...
        // 你的 JS 计算逻辑保持不变
        function calcLineIntersection() {
            let x1 = parseFloat(document.getElementById('l1x1').value);
            let y1 = parseFloat(document.getElementById('l1y1').value);
            let x2 = parseFloat(document.getElementById('l1x2').value);
            let y2 = parseFloat(document.getElementById('l1y2').value);
            let x3 = parseFloat(document.getElementById('l2x1').value);
            let y3 = parseFloat(document.getElementById('l2y1').value);
            let x4 = parseFloat(document.getElementById('l2x2').value);
            let y4 = parseFloat(document.getElementById('l2y2').value);

            let denom = (x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
            if (denom === 0) {
                document.getElementById('lineResult').innerText = "两直线平行或重合，无交点";
                return;
            }
            let px = ((x1*y2-y1*x2)*(x3-x4)-(x1-x2)*(x3*y4-y3*x4))/denom;
            let py = ((x1*y2-y1*x2)*(y3-y4)-(y1-y2)*(x3*y4-y3*x4))/denom;
            document.getElementById('lineResult').innerText = `交点坐标: (${px.toFixed(3)}, ${py.toFixed(3)})`;
        }

        function calcCircleIntersection() {
            let x0 = parseFloat(document.getElementById('c1x').value);
            let y0 = parseFloat(document.getElementById('c1y').value);
            let r0 = parseFloat(document.getElementById('c1r').value);
            let x1 = parseFloat(document.getElementById('c2x').value);
            let y1 = parseFloat(document.getElementById('c2y').value);
            let r1 = parseFloat(document.getElementById('c2r').value);

            let dx = x1 - x0;
            let dy = y1 - y0;
            let d = Math.sqrt(dx*dx + dy*dy);

            if (d > r0 + r1 || d < Math.abs(r0 - r1) || d === 0) {
                document.getElementById('circleResult').innerText = "无交点";
                return;
            }

            let a = (r0*r0 - r1*r1 + d*d) / (2*d);
            let h = Math.sqrt(r0*r0 - a*a);
            let xm = x0 + a*dx/d;
            let ym = y0 + a*dy/d;
            let xs1 = xm + h*dy/d;
            let ys1 = ym - h*dx/d;
            let xs2 = xm - h*dy/d;
            let ys2 = ym + h*dx/d;

            if (d === r0 + r1 || d === Math.abs(r0 - r1)) {
                document.getElementById('circleResult').innerText = `交点坐标: (${xs1.toFixed(3)}, ${ys1.toFixed(3)})`;
            } else {
                document.getElementById('circleResult').innerText = `交点坐标: (${xs1.toFixed(3)}, ${ys1.toFixed(3)}), (${xs2.toFixed(3)}, ${ys2.toFixed(3)})`;
            }
        }

        function calcLineCircleIntersection() {
            let x1 = parseFloat(document.getElementById('lx1').value);
            let y1 = parseFloat(document.getElementById('ly1').value);
            let x2 = parseFloat(document.getElementById('lx2').value);
            let y2 = parseFloat(document.getElementById('ly2').value);
            let xc = parseFloat(document.getElementById('cx').value);
            let yc = parseFloat(document.getElementById('cy').value);
            let r = parseFloat(document.getElementById('cr').value);

            let dx = x2 - x1;
            let dy = y2 - y1;
            let fx = x1 - xc;
            let fy = y1 - yc;

            let a = dx*dx + dy*dy;
            let b = 2*(fx*dx + fy*dy);
            let c = fx*fx + fy*fy - r*r;

            let discriminant = b*b - 4*a*c;
            if (discriminant < 0) {
                document.getElementById('lineCircleResult').innerText = "无交点";
                return;
            }

            let t1 = (-b + Math.sqrt(discriminant)) / (2*a);
            let t2 = (-b - Math.sqrt(discriminant)) / (2*a);

            let points = [];
            if (discriminant === 0) {
                let x = x1 + t1*dx;
                let y = y1 + t1*dy;
                points.push(`(${x.toFixed(3)}, ${y.toFixed(3)})`);
            } else {
                let xA = x1 + t1*dx;
                let yA = y1 + t1*dy;
                let xB = x1 + t2*dx;
                let yB = y1 + t2*dy;
                points.push(`(${xA.toFixed(3)}, ${yA.toFixed(3)})`);
                points.push(`(${xB.toFixed(3)}, ${yB.toFixed(3)})`);
            }
            document.getElementById('lineCircleResult').innerText = `交点坐标: ${points.join(', ')}`;
        }
    </script>
</body>
</html>
